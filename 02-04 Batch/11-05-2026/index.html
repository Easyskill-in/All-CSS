    <link rel="stylesheet" href="./style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .box {
            height: 100px;
            width: 100px;
            background-color: red;
            margin: 10px 20px;
            /* display: inline; */
            /* display: block; */

            display: inline-block;
        }

        p {
            height: 250px;
            width: 400px;
            background-color: red;
            padding: 10px;
        }

        img,
        p {
            display: inline-block;
        }

        .box4 {
            display: block;
        }
    </style>
</head>

<body>
    <div class="box box1">Hello From Box 1</div>
